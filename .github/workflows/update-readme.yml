name: Build README

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  schedule:
    - cron: '0 7-23/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate updated README file
        run: npm start
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Commit and push README
        run: |
          git config user.name "sescer"
          git config user.email "b.patrushev@g.nsu.ru"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to commit"
            exit 0
          fi
          git commit -m "Automated publish: $(date -u '+%a %b %d %H:%M:%S UTC %Y') $(git rev-parse HEAD)"
          git push
